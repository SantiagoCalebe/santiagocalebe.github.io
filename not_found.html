<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found</title>
</head>
<body>
  <div class="backdrop"></div>

    <div class="container">
        <h1>404</h1>
  
        <button id="go-home"><a href="index.html">Go back to Homepage</a></button>
    </div>

    <style>
        body {
  background-color: #000000;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  text-align: center;
  background-color: rgb(24, 0, 39);
  padding: 40px;
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
}

h1 {
  font-size: 100px;
  color: #ffffff;
}

a {
    color: #ffffff;
}

h2 {
  font-size: 24px;
  color: #ffffff;

}

p {
  font-size: 16px;
  color: #ffffff;

}

button {
  background-color: #40006b;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background-color: #450065;
}


.backdrop {
  background-image: url('images/grid.png');
  background-repeat: repeat;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  animation: scrollBackground 20s linear infinite; /* Animação */
}

@keyframes scrollBackground {
  from {
      background-position: 0 0;
  }
  to {
      background-position: 100% 0; /* Move a imagem horizontalmente */
  }
}
    </style>
</body>
</html>
